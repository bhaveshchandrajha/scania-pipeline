# Migration Pipeline – Local examination
# Run: docker-compose -f docker-compose-pipeline.yml up
# Pipeline UI: http://localhost:8003
# Spring Boot (after Run & Demo): http://localhost:8082
#
# Volume mount disabled by default (avoids Docker Desktop file-sharing on Mac).
# To persist changes to host, add to Docker Desktop File Sharing, then uncomment:
#   volumes:
#     - .:/workspace
#
# GITHUB_TOKEN: Loaded from .env so Phase 4 (Push to repo) works. Create .env with:
#   GITHUB_TOKEN=ghp_xxx  (or github_pat_xxx)
#   GIT_USE_TOKEN=1

services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: migration-pipeline:1.0
    container_name: migration-pipeline
    ports:
      - "8003:8003"
      - "8082:8081"   # host:container – use 8082 if 8081 is busy
    env_file: .env
    environment:
      - UI_PORT=8003
      - APP_PORT=8082
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GIT_USE_TOKEN=1
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-efarhatkhan@gmail.com}
      - GIT_USER_NAME=${GIT_USER_NAME:-farcaz}
      - RUN_PROFILE=rds
      # SKIP_TESTS=1: skip test compile/run when tests are out of sync after migration
      - SKIP_TESTS=${SKIP_TESTS:-0}
    working_dir: /workspace
    stdin_open: true
    tty: true
