# Migration Pipeline – Local examination (Docker Desktop, dev)
# Run: docker compose -f docker-compose-pipeline.yml up
#
# For AWS EC2 / server deployment (restart policy, healthcheck, bind mount): see
# docker-compose.ec2.yml and DEPLOY-EC2.md
# Pipeline UI: http://0.0.0.0:8003
# Spring Boot (after Run & Demo): http://0.0.0.0:8082
#
# Volume mount disabled by default (avoids Docker Desktop file-sharing on Mac).
# To persist changes to host, add to Docker Desktop File Sharing, then uncomment:
#   volumes:
#     - .:/workspace
#
# Secrets in .env (gitignored) — loaded via env_file below. Do not duplicate them in
# `environment:` with ${VAR:-} or an empty host VAR overrides .env inside the container.
#   ANTHROPIC_API_KEY=sk-ant-api03-...   # required for migrate / LLM build steps
#   GITHUB_TOKEN=ghp_xxx                 # optional: push to repo
#   GIT_USE_TOKEN=1

services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    image: migration-pipeline:1.0
    container_name: migration-pipeline
    ports:
      - "8003:8003"
      - "8082:8081"   # host:container – use 8082 if 8081 is busy
    env_file: .env
    environment:
      - UI_PORT=8003
      - APP_PORT=8082
      # Browser uses APP_PORT (host); Python proxy calls Spring on this port inside the container.
      - SPRING_INTERNAL_PORT=8081
      - GIT_USE_TOKEN=1
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-efarhatkhan@gmail.com}
      - GIT_USER_NAME=${GIT_USER_NAME:-farcaz}
      - RUN_PROFILE=rds
      # SKIP_TESTS=1: skip test compile/run when tests are out of sync after migration
      - SKIP_TESTS=${SKIP_TESTS:-0}
    working_dir: /workspace
    stdin_open: true
    tty: true
