# Verifies the migration pipeline Docker image builds on each push (deploy confidence).
# Uses the same Dockerfile as .github/workflows/deploy.yml (EC2), not Dockerfile.pipeline.
name: Pipeline Docker

on:
  push:
    branches: [main, master, migration/gc-warranty-claim]
  pull_request:
    branches: [main, master, migration/gc-warranty-claim]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build pipeline image
        run: docker build -t migration-pipeline:ci .

      - name: Smoke check (health endpoint)
        run: |
          docker run -d --name pipeline-smoke -p 18003:8003 \
            -e ANTHROPIC_API_KEY=dummy-not-used-for-health \
            migration-pipeline:ci
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:18003/api/health; then
              echo "OK"
              docker rm -f pipeline-smoke
              exit 0
            fi
            sleep 2
          done
          docker logs pipeline-smoke 2>&1 | tail -50
          docker rm -f pipeline-smoke
          exit 1
