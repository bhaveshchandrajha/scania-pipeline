name: Deploy Scania Java Migration Pipeline to EC2

# Required GitHub Actions secrets (repo → Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY — Anthropic API key for LLM calls in the pipeline UI (migrate, fix, etc.)
# Optional secrets:
#   GIT_PUSH_TOKEN — GitHub PAT with repo access to push generated code (e.g. scania-generated-java).
#     Injected into the EC2 container env so push_to_repo.py can authenticate (no Keychain in Docker).
# Optional repository variables (same page → Variables tab):
#   ANTHROPIC_MODEL — e.g. claude-sonnet-4-5; if unset, the app picks a default model
#
# EC2 Security Group: allow inbound TCP 8003 (Global Context UI) and 8081 (Spring Boot / demo.html)
# from your IP or VPN. Without 8081 published + SG rule, http://<host>:8081/demo.html will not load.

on:
  push:
    branches: '**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/scania-migration-pipeline:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Fail before SSH if the secret is missing (empty expansion would start a container with no key).
      - name: Require ANTHROPIC_API_KEY repository secret
        run: |
          if [ "${#ANTHROPIC_API_KEY}" -lt 20 ]; then
            echo "::error::Repository secret ANTHROPIC_API_KEY is missing or too short. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 3.25.70.33
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to Docker Hub
            echo ${{ secrets.DOCKERHUB_TOKEN }} | sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            
            # Stop the old container
            sudo docker stop scania-migration-pipeline-container || true
            sudo docker rm scania-migration-pipeline-container || true
            
            # Pull the latest image
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/scania-migration-pipeline:latest
            
            # Write env file with Python so keys with quotes/special chars survive (printf can break).
            # Placeholders are expanded on the GitHub runner before this script is sent over SSH.
            ENVF=$(mktemp /tmp/scania-pipeline.env.XXXXXX)
            trap 'rm -f "$ENVF"' EXIT
            chmod 600 "$ENVF"
            export SCANIA_ENV_FILE="$ENVF"
            python3 <<'PY'
            import os
            import pathlib
            key = """${{ secrets.ANTHROPIC_API_KEY }}"""
            model = """${{ vars.ANTHROPIC_MODEL }}"""
            git_push = """${{ secrets.GIT_PUSH_TOKEN }}"""
            key = key.strip().split("\n", 1)[0].strip()
            lines = [f"ANTHROPIC_API_KEY={key}"]
            m = model.strip().split("\n", 1)[0].strip()
            if m:
                lines.append(f"ANTHROPIC_MODEL={m}")
            g = git_push.strip().split("\n", 1)[0].strip()
            if g:
                lines.append(f"GIT_PUSH_TOKEN={g}")
            pathlib.Path(os.environ["SCANIA_ENV_FILE"]).write_text(
                "\n".join(lines) + "\n", encoding="utf-8"
            )
            PY
            
            # Run the new container: 8003 = Python UI; 8081 = Spring Boot (demo.html, APIs) inside container
            sudo docker run -d \
              --name scania-migration-pipeline-container \
              -p 8003:8003 \
              -p 8081:8081 \
              --restart always \
              --env-file "$ENVF" \
              ${{ secrets.DOCKERHUB_USERNAME }}/scania-migration-pipeline:latest
