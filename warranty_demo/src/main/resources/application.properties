# Spring Boot Application Configuration
# Warranty Claim Management System
#
# DEFAULT: H2 in-memory (robust, no external DB required)
# Use profile "rds" for AWS RDS PostgreSQL: -Dspring-boot.run.profiles=rds

# Server Configuration
server.port=8081
server.servlet.context-path=/

# Character encoding for HTTP (German characters ä, ö, ü, ß)
# CCSID 273 (EBCDIC German) data from IBM i should be converted to UTF-8 before persistence
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Application Name
spring.application.name=warranty-claim-management

# Database Configuration - DEFAULT: H2 file-based (works offline, no TCP needed)
# H2 Console: same URL jdbc:h2:file:./data/warranty_db, User: sa, Driver: Generic H2 (Embedded)
spring.datasource.url=jdbc:h2:file:./data/warranty_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# H2 Console (for database inspection during demo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.scania.warranty=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# CORS Configuration (for frontend integration)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
