# Local/offline profile - H2 in-memory fallback
# Use with: -Dspring-boot.run.profiles=local
# H2 uses UTF-8 by default for German characters (ä, ö, ü, ß)

spring.datasource.url=jdbc:h2:file:./data/warranty_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# H2 Console (for database inspection during demo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
