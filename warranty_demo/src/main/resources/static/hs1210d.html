<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HS1210D – Auto UI</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 16px; background: #f3f4f6; }
    h1 { margin-bottom: 8px; }
    .toolbar { margin-bottom: 12px; }
    .toolbar label { margin-right: 12px; }
    .toolbar input { padding: 4px 8px; }
    .toolbar button { padding: 4px 10px; margin-left: 8px; cursor: pointer; }
    table { border-collapse: collapse; width: 100%; background: white; }
    th, td { border: 1px solid #e5e7eb; padding: 8px; font-size: 14px; }
    th { background: #e5e7eb; text-align: left; }
    tr:nth-child(even) { background: #f9fafb; }
  </style>
</head>
<body>
  <h1 id="title">HS1210D</h1>
  <div class="toolbar">
    <label>
      Company:
      <input id="companyInput" value="001" />
    </label>
    <button id="refreshBtn">Refresh</button>
  </div>
  <table id="claimsTable">
    <thead><tr id="theadRow"></tr></thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    async function loadSchema() {
      const res = await fetch('/api/ui-schemas/HS1210D');
      if (!res.ok) throw new Error('Failed to load UI schema');
      return res.json();
    }

    async function loadData(schema, companyCode) {
      const ds = schema.dataSource;
      const url = new URL(ds.url, window.location.origin).toString();
      const method = (ds.method || 'POST').toUpperCase();
      const body = {
        companyCode: companyCode || (ds.params?.companyCode?.value) || '001',
        openClaimsOnly: false,
        ascending: true
      };
      const res = await fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error('Failed to load claims');
      const json = await res.json();
      if (Array.isArray(json)) return json;
      if (Array.isArray(json.claims)) return json.claims;
      return [];
    }

    function renderTable(schema, data) {
      const theadRow = document.getElementById('theadRow');
      const tbody = document.getElementById('tbody');
      theadRow.innerHTML = '';
      tbody.innerHTML = '';

      schema.columns.forEach(col => {
        const th = document.createElement('th');
        th.textContent = col.label;
        theadRow.appendChild(th);
      });

      data.forEach(item => {
        const tr = document.createElement('tr');
        schema.columns.forEach(col => {
          const td = document.createElement('td');
          td.textContent = item[col.dtoField] ?? '';
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    async function refresh() {
      try {
        const company = document.getElementById('companyInput').value.trim();
        const schema = await loadSchema();
        document.getElementById('title').textContent =
          schema.title || schema.screenId || 'HS1210D';
        const data = await loadData(schema, company);
        renderTable(schema, data);
      } catch (e) {
        alert(e.message || e);
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', refresh);
    refresh();
  </script>
</body>
</html>
