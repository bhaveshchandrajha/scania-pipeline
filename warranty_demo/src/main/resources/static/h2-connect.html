<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>H2 Console - Connect</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 2rem auto; padding: 1rem; }
    .btn { display: inline-block; padding: 0.5rem 1rem; background: #2563eb; color: white; text-decoration: none; border-radius: 6px; margin-top: 1rem; }
    .btn:hover { background: #1d4ed8; }
    code { background: #f1f5f9; padding: 0.125rem 0.25rem; border-radius: 4px; font-size: 0.875rem; }
  </style>
</head>
<body>
  <h1>H2 Database Console</h1>
  <p>Click below to open the H2 console with the warranty database pre-filled:</p>
  <form id="h2form" method="POST" action="/h2-console/login.do" target="_blank">
    <input type="hidden" name="url" value="jdbc:h2:file:./data/warranty_db" />
    <input type="hidden" name="jdbcUrl" value="jdbc:h2:file:./data/warranty_db" />
    <input type="hidden" name="user" value="sa" />
    <input type="hidden" name="password" value="" />
    <input type="hidden" name="driverClass" value="org.h2.Driver" />
    <button type="submit" class="btn">Open H2 Console</button>
  </form>
  <p style="margin-top: 1rem; color: #64748b; font-size: 0.875rem;">
    Or go to <a href="/h2-console">/h2-console</a> and paste: <code>jdbc:h2:file:./data/warranty_db</code>, User: sa, Driver: Generic H2 (Embedded)
  </p>
</body>
</html>
