# Schema export profile - generates schema.sql and data.sql for PostgreSQL
# Run: mvn spring-boot:run -Dspring-boot.run.profiles=schema
# Output: target/schema.sql (DDL) - then add INSERTs from DataInitializer

spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=create
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=target/schema.sql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
