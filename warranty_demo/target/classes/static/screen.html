<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Screen – DDS-driven UI</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 16px; background: #f3f4f6; }
    h1 { margin-bottom: 4px; }
    .subtitle { color: #6b7280; margin-bottom: 12px; }
    .toolbar { margin-bottom: 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .toolbar label { margin-right: 8px; }
    .toolbar input { padding: 4px 8px; }
    .actions { margin-bottom: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .actions button { padding: 6px 10px; border-radius: 4px; border: 1px solid #e5e7eb; background: white; cursor: pointer; }
    .actions button:hover { background: #eff6ff; border-color: #93c5fd; }
    table { border-collapse: collapse; width: 100%; background: white; }
    th, td { border: 1px solid #e5e7eb; padding: 8px; font-size: 14px; }
    th { background: #e5e7eb; text-align: left; }
    tr:nth-child(even) { background: #f9fafb; }
  </style>
</head>
<body>
  <h1 id="title">Screen</h1>
  <div class="subtitle" id="subtitle"></div>

  <div class="toolbar">
    <label>
      Company:
      <input id="companyInput" value="001" />
    </label>
  </div>

  <div class="actions" id="actionsBar"></div>

  <table id="dataTable">
    <thead><tr id="theadRow"></tr></thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    function getScreenId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('screenId') || 'HS1210D';
    }

    async function loadSchema(screenId) {
      const res = await fetch('/api/ui-schemas/' + encodeURIComponent(screenId));
      if (!res.ok) throw new Error('Failed to load UI schema for ' + screenId);
      return res.json();
    }

    async function loadData(schema, companyCode) {
      const ds = schema.dataSource;
      const url = new URL(ds.url, window.location.origin);
      if (ds.params && ds.params.companyCode) {
        url.searchParams.set(
          'companyCode',
          companyCode || ds.params.companyCode.value || '001'
        );
      }
      const res = await fetch(url.toString());
      if (!res.ok) throw new Error('Failed to load data');
      const json = await res.json();
      if (Array.isArray(json)) return json;
      if (Array.isArray(json.claims)) return json.claims;
      return [];
    }

    function renderTable(schema, data) {
      const theadRow = document.getElementById('theadRow');
      const tbody = document.getElementById('tbody');
      theadRow.innerHTML = '';
      tbody.innerHTML = '';

      (schema.columns || []).forEach(col => {
        const th = document.createElement('th');
        th.textContent = col.label;
        theadRow.appendChild(th);
      });

      data.forEach(item => {
        const tr = document.createElement('tr');
        (schema.columns || []).forEach(col => {
          const td = document.createElement('td');
          td.textContent = item[col.dtoField] ?? '';
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function renderActions(schema, screenId, refreshFn) {
      const bar = document.getElementById('actionsBar');
      bar.innerHTML = '';
      (schema.actions || []).forEach(action => {
        const btn = document.createElement('button');
        // IMPORTANT: show label exactly as in schema (preserves CFxx titles).
        btn.textContent = action.label || action.id || '';
        btn.addEventListener('click', () => {
          switch (action.type) {
            case 'refresh':
              refreshFn();
              break;
            default:
              alert('Action not yet implemented: ' + (action.label || action.id) +
                    '\\n(screenId=' + screenId + ', type=' + (action.type || '') + ')');
          }
        });
        bar.appendChild(btn);
      });
    }

    async function init() {
      const screenId = getScreenId();
      const schema = await loadSchema(screenId);
      document.getElementById('title').textContent =
        schema.title || schema.screenId || screenId;
      document.getElementById('subtitle').textContent =
        'Screen ID: ' + (schema.screenId || screenId);

      const doRefresh = async () => {
        const company = document.getElementById('companyInput').value.trim();
        const data = await loadData(schema, company);
        renderTable(schema, data);
      };

      renderActions(schema, screenId, doRefresh);
      await doRefresh();
    }

    init().catch(err => alert(err.message || err));
  </script>
</body>
</html>
