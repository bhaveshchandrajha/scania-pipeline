# Spring Boot Application Configuration
# Warranty Claim Management System

# Server Configuration (listen on all interfaces)
server.port=8081
server.address=0.0.0.0
server.servlet.context-path=/

# Application Name
spring.application.name=warranty-claim-management

# Database Configuration (H2 in-memory for demo)
spring.datasource.url=jdbc:h2:mem:warranty_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for database inspection during demo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.scania.warranty=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# CORS Configuration (for frontend integration)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
